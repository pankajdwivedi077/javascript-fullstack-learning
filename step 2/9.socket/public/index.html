<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="bell chan" >
    <meta name="description" content="chat app">
    <title>Socket.Io</title>
</head>
<body>
    
   <div id="user-list">
    <h3>Online Users</h3>
    <ul id="users"></ul>
   </div>

   <div id="chat">

   </div>

   <form id="message-form">
    <input 
    type="text"
    id="message-input"
    placeholder="Enter your message"
    required
    >
    <button type="submit">Send</button>
   </form>

   <script src="/socket.io/socket.io.js"></script> // client bundle

   <script>

      const socket = io();

      const chat = document.getElementById("chat");
      const userList = document.getElementById("user-list");
      const messageForm = document.getElementById("message-form");
      const messageInput = document.getElementById("message-input");

      const userName = prompt('Enter your username');

      socket.emit('join', userName);

      socket.on("userJoined", (user) => {
          addMessage(`${user} has joined the chat`);
      })

      socket.on("userLeft", (user) => {
        addMessage(`${user} has left the chat`)
      })

      socket.on("userList", (users) => {
        userList.innerHTML = users.map(user => `<li>${user}</li>`).join("");
      })

      // listen for chat message event from the server
      socket.on("chatMessage", (message) => {
        addMessage(`${message.userName} : ${message.text}`)
      })

      // handle form submission
      messageForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const extractMessage = messageInput.value.trim();
        if(extractMessage){
            socket.emit("chatMessage", {
                userName, text: extractMessage
            })
            messageInput.value = "";
        }
      })

      function addMessage(input){
        const messageElemet = document.createElement("div");
        messageElemet.textContent = input;
        chat.appendChild(messageElemet);
        // scroll to the bottom of the chat container
        chat.scrollTop = chat.scrollHeight;
      }

   </script>

</body>
</html>
